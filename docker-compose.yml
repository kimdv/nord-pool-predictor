services:
  postgres:
    image: postgres:16-alpine
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nordpool -d nordpool"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_DB: nordpool
      POSTGRES_USER: ${NORDPOOL_DB_USER:-nordpool}
      POSTGRES_PASSWORD: ${NORDPOOL_DB_PASSWORD:-nordpool}
    volumes:
      - pgdata:/var/lib/postgresql/data
    shm_size: 256m
    networks:
      - nordpool-backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
    environment:
      DATABASE_URL: postgresql+asyncpg://${NORDPOOL_DB_USER:-nordpool}:${NORDPOOL_DB_PASSWORD:-nordpool}@postgres:5432/nordpool
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      MODEL_DIR: /data/models
    volumes:
      - models:/data/models
    ports:
      - "8000:8000"
    networks:
      - nordpool-backend
      - nordpool-public
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: "2"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: always
    depends_on:
      app:
        condition: service_healthy
    environment:
      API_BASE_URL: http://app:8000
    ports:
      - "3000:3000"
    networks:
      - nordpool-public
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "1"

volumes:
  pgdata:
  models:

networks:
  nordpool-backend:
    internal: true
  nordpool-public:
